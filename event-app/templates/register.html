<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <script src="{{ url_for('static', filename='index.js') }}"></script>
</head>

<body>

    <h1>Registration Form</h1>

    {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
    <p class="success-message">{{ message }}</p>

    <script>
        console.log("Registration successful (Flask)");
    </script>
    {% endfor %}
    {% endwith %}

    <form action="/" method="post" onsubmit="return validateForm()">

        <label>Email:</label>
        <input title="email" type="email" id="email" name="email" required><br><br>

        <label>Password:</label>
        <input title="password" type="password" id="password" name="password" required><br><br>

        <input type="submit" value="Submit" onclick="showLog()">
    </form>

</body>

</html>
